#cloud-config
# Runs once on first boot. Installs .NET 10, nginx, and sets up the
# worldcup app as a systemd service.

package_update: true
package_upgrade: true

packages:
  - nginx
  - curl
  - unzip
  - apt-transport-https

runcmd:
  # ── Install .NET 10 ──────────────────────────────────────────────────────────
  - curl -fsSL https://dot.net/v1/dotnet-install.sh | bash -s -- --channel 10.0 --install-dir /usr/share/dotnet
  - ln -sf /usr/share/dotnet/dotnet /usr/local/bin/dotnet

  # ── Create app user and directories ─────────────────────────────────────────
  - useradd -r -s /bin/false worldcup
  - mkdir -p /opt/worldcup /var/worldcup
  - chown worldcup:worldcup /opt/worldcup /var/worldcup

  # ── nginx reverse proxy ──────────────────────────────────────────────────────
  - |
    cat > /etc/nginx/sites-available/worldcup <<'EOF'
    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass         http://127.0.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
        }
    }
    EOF
  - ln -sf /etc/nginx/sites-available/worldcup /etc/nginx/sites-enabled/worldcup
  - rm -f /etc/nginx/sites-enabled/default
  - systemctl enable nginx
  - systemctl restart nginx

  # ── systemd service (starts once app is deployed) ────────────────────────────
  - |
    cat > /etc/systemd/system/worldcup.service <<'EOF'
    [Unit]
    Description=World Cup Formations (Blazor Server)
    After=network.target

    [Service]
    Type=exec
    User=worldcup
    WorkingDirectory=/opt/worldcup
    ExecStart=/usr/local/bin/dotnet /opt/worldcup/WorldCupFormations.Web.dll
    Restart=always
    RestartSec=10
    Environment=ASPNETCORE_ENVIRONMENT=Production
    Environment=ASPNETCORE_URLS=http://127.0.0.1:5000
    Environment=DB_PATH=/var/worldcup/worldcup.db

    [Install]
    WantedBy=multi-user.target
    EOF
  - systemctl daemon-reload
  - systemctl enable worldcup
